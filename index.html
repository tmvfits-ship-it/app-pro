<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Entrenamiento</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita doble scroll */
            background-color: #111827; /* Tu color oscuro de fondo */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbyXn4zWQ3_wRZvccZDnvlya7c7dlgrG6_WzsqwF-Q3REXGDLCEy5ZWBJps3cwvMkvzijQ/exec"></iframe>

    <script>
        // Esto le dice al celular que la app se puede instalar
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function() {
                console.log('Service Worker Registrado');
            });
        }
    </script>
</body>
</html>
